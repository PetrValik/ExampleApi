# Dashboard reverse proxy. Serves the static dashboard and proxies
#   /impl/<name>/<path>  ->  http://<name>:8080/<path>
# so Swagger "try it out" against any implementation stays same-origin (no CORS).
server {
    listen 80;
    server_name _;

    # Docker's embedded DNS — required to resolve service names in a variable proxy_pass.
    resolver 127.0.0.11 valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    location = /openapi.yaml { default_type application/yaml; }
    location = /data.json    { default_type application/json; }

    # Reverse proxy to each implementation container by service name.
    location ~ ^/impl/([a-z0-9-]+)/(.*)$ {
        set $impl $1;
        set $rest $2;
        proxy_pass http://$impl:8080/$rest$is_args$args;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / { try_files $uri $uri/ =404; }
}
