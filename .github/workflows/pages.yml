name: Deploy dashboard to Pages

# Publishes the static comparison dashboard (charts + tables) as a free public reference page.
# The live "API explorer" needs running backends, so on Pages it shows the charts only.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh dashboard data
        run: node scripts/gen-dashboard-data.mjs
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp dashboard/index.html _site/index.html
          cp dashboard/data.json  _site/data.json
          cp contract/openapi.yaml _site/openapi.yaml
          [ -f bench/sweep.json ] && cp bench/sweep.json _site/sweep.json || echo "no sweep.json yet"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
