services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      POSTGRES_DB: exampleapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      JWT_SECRET: "CHANGE-THIS-DEMO-SECRET-AT-LEAST-32-CHARACTERS-LONG"
      JWT_ISSUER: "ExampleApi"
      JWT_AUDIENCE: "ExampleApiClient"
      JWT_EXPIRATION_MINUTES: "60"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exampleapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exampleapi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
