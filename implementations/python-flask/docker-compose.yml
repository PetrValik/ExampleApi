services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/exampleapi
      JWT_SECRET_KEY: CHANGE-THIS-IN-PRODUCTION-use-a-long-random-secret-key-min-32chars
      JWT_ISSUER: ExampleApi
      JWT_AUDIENCE: ExampleApiClient
      JWT_EXPIRATION_MINUTES: "60"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exampleapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exampleapi"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
